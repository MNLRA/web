<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactos | Catering Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="container header-flex">
            <div class="logo">
                <img src="https://placehold.co/50x50?text=CH" alt="Logo">
                <h1>Catering Home</h1>
            </div>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="servicios.html">Servicios</a></li>
                    <li><a href="productos.html">Productos</a></li>
                    <li><a href="nosotros.html">Nosotros</a></li>
                    <li><a href="contactos.html">Contactos</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <h1 class="page-title">CONTACTOS</h1>
        <div class="contact-box">
            <form id="contactForm">
                <input type="text" placeholder="Nombre completo" required>
                <input type="email" placeholder="Correo electrónico" required>
                <input type="tel" placeholder="Teléfono">
                <textarea rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>
                <button type="submit" class="btn btn-full">Enviar Mensaje</button>
            </form>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
